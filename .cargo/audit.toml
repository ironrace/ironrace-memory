# cargo-audit ignore list.
#
# These are transitive advisories that remain after updating the lockfile.
# Each entry documents the actual reason we accept the risk today and what
# condition should trigger removal from this list.

[advisories]

# bincode 1.3.3 — pulled in transitively by hnsw_rs (= 0.3.4).
# We only use hnsw_rs for in-memory graph construction/search. This repo does
# not call any hnsw_rs dump/load APIs or otherwise deserialize bincode payloads
# from users, disk, or the network, so the practical exposure is much lower
# than the generic advisory text implies. Revisit when hnsw_rs upgrades.
ignore = [
    # RUSTSEC-2025-0141 — bincode is unmaintained.
    "RUSTSEC-2025-0141",
    # RUSTSEC-2025-0119 — number_prefix is unmaintained.
    # Only used transitively through hf-hub's progress UI.
    "RUSTSEC-2025-0119",
    # RUSTSEC-2024-0436 — paste is unmaintained.
    # Only used as a proc-macro dependency under tokenizers; no runtime surface.
    "RUSTSEC-2024-0436",
]
