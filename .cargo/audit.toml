# cargo-audit ignore list
#
# These are transitive dependency advisories that we cannot resolve without
# forking or replacing upstream crates. Each entry documents why we accept
# the risk and when to revisit.

[advisories]

# bincode 1.3.3 — pulled in transitively by hnsw_rs (= 0.3.4).
# bincode 1.x is unmaintained; the maintainers recommend bincode 2.x.
# Impact: internal serialization only, not exposed to user input.
# Revisit when hnsw_rs ships a release that drops or upgrades bincode.
ignore = [
    # RUSTSEC-2021-0127 — bincode: Possible Denial of Service with large inputs
    # (internally used by hnsw_rs for HNSW graph serialisation; not triggered
    # by our usage pattern which serialises compact fixed-size float vectors)
    "RUSTSEC-2021-0127",
    # RUSTSEC-2023-0005 — number_prefix: Unmaintained
    # Pulled in transitively via indicatif (benchmarking) or ort crate.
    # Not in the hot path; no CVE assigned.
    "RUSTSEC-2023-0005",
    # RUSTSEC-2024-0370 — paste: Unmaintained
    # Pulled in transitively. paste is a proc-macro crate with no runtime
    # surface area; the security risk is effectively zero.
    "RUSTSEC-2024-0370",
]
