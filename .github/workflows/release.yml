name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Verify plugin versions
        run: bash scripts/check_versions.sh

      - name: Build release binary
        run: cargo build --release -p ironrace-memory --bin ironmem

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          archive="ironmem-${GITHUB_REF_NAME}-${{ matrix.platform }}-${arch}.tar.gz"
          mkdir -p dist/package
          cp target/release/ironmem dist/package/ironmem
          cp README.md LICENSE CHANGELOG.md dist/package/
          tar -czf "dist/${archive}" -C dist/package .
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: dist/*

  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: publish-release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: Publish ironrace-core
        run: cargo publish -p ironrace-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index ironrace-core
        run: sleep 90

      - name: Publish ironrace-embed
        run: cargo publish -p ironrace-embed
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index ironrace-embed
        run: sleep 90

      - name: Publish ironrace-memory
        run: cargo publish -p ironrace-memory
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
