name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify plugin versions
        run: bash scripts/check_versions.sh

      - name: Build release binary
        run: cargo build --release -p ironrace-memory --bin ironmem

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          arch="$(uname -m)"
          archive="ironmem-${GITHUB_REF_NAME}-${{ matrix.platform }}-${arch}.tar.gz"
          mkdir -p dist/package
          cp target/release/ironmem dist/package/ironmem
          cp README.md LICENSE CHANGELOG.md dist/package/
          tar -czf "dist/${archive}" -C dist/package .
          shasum -a 256 "dist/${archive}" > "dist/${archive}.sha256"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: dist/*

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
