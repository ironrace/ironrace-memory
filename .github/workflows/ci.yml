name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      # Workaround for the Homebrew rustup-init shim on macos-latest:
      # the runner image keeps a `cargo`/`rustc` symlink at a PATH
      # entry ahead of `~/.cargo/bin`, and the precedence is
      # *non-deterministic across runner images* — `GITHUB_PATH`
      # prepend works on some runs and not others. Two layers of defense:
      #   1. `rustup default stable` makes the rustup config consistent.
      #   2. The `cargo test` step calls cargo by absolute path
      #      (`$HOME/.cargo/bin/cargo`) so PATH precedence is
      #      irrelevant for the immediate invocation.
      # We also still prepend `$HOME/.cargo/bin` to GITHUB_PATH so any
      # child processes cargo spawns (rustc -vV, build scripts, etc.)
      # find the real toolchain first when they inherit PATH.
      - name: Force stable toolchain default + prepend cargo bin to PATH (macOS rustup-init shim workaround)
        run: |
          rustup default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo test
        run: "$HOME/.cargo/bin/cargo" test --workspace

  build:
    name: Build Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ironmem-linux
            binary_path: target/debug/ironmem
          - os: macos-latest
            artifact_name: ironmem-macos
            binary_path: target/debug/ironmem
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      # See the cargo test step in the `test` job for why we call
      # cargo by absolute path on macOS.
      - name: Force stable toolchain default + prepend cargo bin to PATH (macOS rustup-init shim workaround)
        run: |
          rustup default stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo build
        run: "$HOME/.cargo/bin/cargo" build -p ironmem --bin ironmem

      - name: Upload binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}

  mcp-smoke:
    name: MCP Smoke Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo build
        run: cargo build -p ironmem --bin ironmem

      - name: Live initialize smoke test
        run: python3 scripts/mcp_smoke_test.py --binary ./target/debug/ironmem

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998  # v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  package:
    name: Package Dry-Run
    runs-on: ubuntu-latest
    needs: [check, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2

      - name: cargo package workspace
        run: cargo package --workspace

  plugin-metadata:
    name: Plugin Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Validate JSON syntax
        run: |
          for f in .codex-plugin/plugin.json .codex-plugin/hooks.json \
                   .claude-plugin/plugin.json .claude-plugin/.mcp.json; do
            echo "Validating $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Check version consistency
        run: bash scripts/check_versions.sh
